<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The MediuM - Digital Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #020617; /* slate-950 */
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .spiral-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 0.5rem;
            width: 100%;
            height: 100%;
            max-width: 70vh;
            max-height: 70vh;
            position: relative;
        }

        .tile {
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 0.75rem;
            border: 2px solid #1e293b; /* slate-800 */
            background-color: #0f172a; /* slate-900 */
        }

        .tile-active { border-color: #334155; color: #64748b; }
        .tile-start { border-color: #818cf8; color: #818cf8; background-color: rgba(49, 46, 129, 0.5); }
        .tile-finish { border-color: #fbbf24; color: #fbbf24; background-color: rgba(120, 53, 15, 0.5); }

        .piece {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 9999px;
            border: 2px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 640px) {
            .piece { width: 1rem; height: 1rem; }
        }
    </style>
</head>
<body class="p-2">

    <!-- Setup Screen -->
    <div id="setup-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] shadow-2xl max-w-sm w-full text-center space-y-8">
            <div class="space-y-2">
                <h1 class="text-4xl font-black text-indigo-500 tracking-tighter">THE MEDIUM</h1>
                <p class="text-slate-500 text-sm">디지털 보드 전용 관리 도구</p>
            </div>
            <div class="space-y-6">
                <div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl">
                    <span class="font-bold">참여 팀 수</span>
                    <div class="flex items-center space-x-4">
                        <button onclick="updateTeamCount(-1)" class="w-8 h-8 flex items-center justify-center bg-slate-700 rounded-lg hover:bg-slate-600">-</button>
                        <span id="team-count-display" class="w-4 font-bold text-xl">2</span>
                        <button onclick="updateTeamCount(1)" class="w-8 h-8 flex items-center justify-center bg-slate-700 rounded-lg hover:bg-slate-600">+</button>
                    </div>
                </div>
                <button onclick="startGame()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-indigo-900/20">
                    게임 시작
                </button>
            </div>
        </div>
    </div>

    <!-- Play Screen -->
    <div id="play-screen" class="hidden h-full w-full flex flex-row gap-2">
        
        <!-- Left: Board Section (70%) -->
        <div class="flex-[7] relative bg-slate-900 rounded-3xl border border-slate-800 p-6 flex items-center justify-center">
            <div id="board-container" class="spiral-grid">
                <!-- SVG Spiral Path -->
                <svg class="absolute inset-0 w-full h-full p-2 pointer-events-none opacity-10" viewBox="0 0 500 500">
                    <path d="M 50,50 L 450,50 L 450,450 L 50,450 L 50,150 L 350,150 L 350,350 L 150,350 L 150,250 L 250,250" fill="none" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <!-- Tiles will be generated by JS -->
            </div>
        </div>

        <!-- Right: Control Panel (30%) -->
        <div class="flex-[3] flex flex-col gap-2">
            
            <!-- Current Turn -->
            <div id="active-turn-card" class="p-5 rounded-3xl text-white shadow-lg flex items-center justify-between transition-colors duration-500">
                <div>
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Active Turn</p>
                    <h2 id="current-team-name" class="text-2xl font-black italic">팀 A</h2>
                </div>
                <i class="fas fa-users text-3xl opacity-50"></i>
            </div>

            <!-- Controls -->
            <div class="bg-slate-900 rounded-3xl border border-slate-800 p-5 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <span class="text-slate-400 font-bold text-sm">말 이동 제어</span>
                    <span id="current-pos-display" class="bg-slate-800 text-indigo-400 px-3 py-1 rounded-full text-xs font-bold">위치: 0</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="movePiece(1)" class="bg-slate-800 hover:bg-indigo-600 text-white py-3 rounded-xl font-black transition-all">+1</button>
                    <button onclick="movePiece(2)" class="bg-slate-800 hover:bg-indigo-600 text-white py-3 rounded-xl font-black transition-all">+2</button>
                    <button onclick="movePiece(3)" class="bg-slate-800 hover:bg-indigo-600 text-white py-3 rounded-xl font-black transition-all">+3</button>
                    <button onclick="movePiece(4)" class="bg-slate-800 hover:bg-indigo-600 text-white py-3 rounded-xl font-black transition-all">+4</button>
                    <button onclick="movePiece(-1)" class="bg-red-900/20 border border-red-900/50 text-red-400 py-3 rounded-xl font-black hover:bg-red-900/40 transition-all">-1 후퇴</button>
                    <button onclick="nextTurn()" class="bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-black flex items-center justify-center gap-2">
                        다음 팀 <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>

            <!-- Log -->
            <div class="flex-1 bg-slate-900 rounded-3xl border border-slate-800 p-5 overflow-hidden flex flex-col">
                <div class="flex items-center gap-2 text-slate-500 mb-3">
                    <i class="fas fa-history text-sm"></i>
                    <span class="text-xs font-bold uppercase tracking-wider">Game Log</span>
                </div>
                <div id="log-container" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar">
                    <!-- Logs go here -->
                </div>
            </div>

            <!-- Hint Box -->
            <div class="bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-2xl flex items-start gap-3">
                <i class="fas fa-lightbulb text-indigo-400 mt-1"></i>
                <p class="text-[11px] text-indigo-300/80 leading-relaxed">
                    인쇄된 카드의 힌트 차수에 맞춰 이동하세요.<br>
                    정답 시 <span class="text-indigo-300 font-bold">+4 ~ +1</span> 버튼을 클릭합니다.
                </p>
            </div>
        </div>
    </div>

    <!-- Finish Screen -->
    <div id="finish-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-yellow-500/50 p-10 rounded-[3rem] shadow-2xl text-center space-y-6 max-w-sm">
            <div class="text-yellow-400 text-7xl mb-4"><i class="fas fa-crown"></i></div>
            <h2 class="text-4xl font-black text-white">VICTORY!</h2>
            <p id="winner-text" class="text-xl text-indigo-400 font-bold italic"></p>
            <button onclick="location.reload()" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-2xl font-bold transition-all">
                다시 시작하기
            </button>
        </div>
    </div>

    <script>
        // --- Game Logic ---
        const MAX_TILES = 20;
        const SPIRAL_COORDS = [
            [0,0], [1,0], [2,0], [3,0], [4,0], 
            [4,1], [4,2], [4,3], [4,4],       
            [3,4], [2,4], [1,4], [0,4],       
            [0,3], [0,2], [0,1],             
            [1,1], [2,1], [3,1],             
            [3,2], [3,3], [2,3], [1,3], [1,2], [2,2] 
        ];

        let teams = [];
        let turnIndex = 0;
        let teamCount = 2;

        const TEAM_COLORS = [
            { bg: 'bg-blue-600', code: '#2563eb' },
            { bg: 'bg-red-600', code: '#dc2626' },
            { bg: 'bg-green-600', code: '#16a34a' },
            { bg: 'bg-yellow-500', code: '#eab308' }
        ];

        function updateTeamCount(val) {
            teamCount = Math.max(2, Math.min(4, teamCount + val));
            document.getElementById('team-count-display').innerText = teamCount;
        }

        function startGame() {
            for (let i = 0; i < teamCount; i++) {
                teams.push({
                    id: i,
                    name: `팀 ${String.fromCharCode(65 + i)}`,
                    pos: 0,
                    color: TEAM_COLORS[i]
                });
            }
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('play-screen').classList.remove('hidden');
            
            initBoard();
            updateUI();
            addLog("게임을 시작합니다. 맥루한의 세계에 오신 것을 환영합니다!");
        }

        function initBoard() {
            const container = document.getElementById('board-container');
            for (let i = 0; i <= MAX_TILES; i++) {
                const tile = document.createElement('div');
                tile.id = `tile-${i}`;
                const [x, y] = SPIRAL_COORDS[i];
                tile.style.gridColumnStart = x + 1;
                tile.style.gridRowStart = y + 1;
                tile.className = `tile ${i === 0 ? 'tile-start' : i === MAX_TILES ? 'tile-finish' : 'tile-active'}`;
                tile.innerText = i === 0 ? 'START' : i === MAX_TILES ? 'FINISH' : i;
                
                // Container for pieces
                const pieceContainer = document.createElement('div');
                pieceContainer.id = `pieces-${i}`;
                pieceContainer.className = "absolute inset-0 flex flex-wrap items-center justify-center p-1 gap-1 pointer-events-none";
                tile.appendChild(pieceContainer);
                
                container.appendChild(tile);
            }
            renderPieces();
        }

        function renderPieces() {
            // Clear all tiles
            for (let i = 0; i <= MAX_TILES; i++) {
                document.getElementById(`pieces-${i}`).innerHTML = '';
            }
            // Add pieces to their current positions
            teams.forEach(team => {
                const container = document.getElementById(`pieces-${team.pos}`);
                const piece = document.createElement('div');
                piece.className = `piece ${team.color.bg}`;
                container.appendChild(piece);
            });
        }

        function movePiece(amount) {
            const team = teams[turnIndex];
            const oldPos = team.pos;
            team.pos = Math.max(0, Math.min(MAX_TILES, team.pos + amount));
            
            if (oldPos !== team.pos) {
                addLog(`${team.name}: ${oldPos} → ${team.pos}칸 (${amount > 0 ? '+' : ''}${amount})`);
                renderPieces();
                updateUI();
                
                if (team.pos === MAX_TILES) {
                    endGame(team);
                }
            }
        }

        function nextTurn() {
            turnIndex = (turnIndex + 1) % teams.length;
            updateUI();
        }

        function updateUI() {
            const team = teams[turnIndex];
            const card = document.getElementById('active-turn-card');
            const nameDisplay = document.getElementById('current-team-name');
            const posDisplay = document.getElementById('current-pos-display');
            
            // UI Color Change
            card.className = `p-5 rounded-3xl text-white shadow-lg flex items-center justify-between transition-all duration-500 ${team.color.bg}`;
            nameDisplay.innerText = team.name;
            posDisplay.innerText = `위치: ${team.pos}`;
        }

        function addLog(msg) {
            const container = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const entry = document.createElement('div');
            entry.className = "text-[11px] leading-relaxed text-slate-300 bg-slate-800/50 p-2 rounded-xl border-l-2 border-indigo-500 animate-in slide-in-from-left duration-300";
            entry.innerHTML = `<span class="opacity-40 mr-1">[${time}]</span> ${msg}`;
            container.prepend(entry);
        }

        function endGame(winner) {
            document.getElementById('finish-screen').classList.remove('hidden');
            document.getElementById('winner-text').innerText = `${winner.name}이(가) 승리했습니다!`;
        }
    </script>
</body>
</html>
